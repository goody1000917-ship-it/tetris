<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiple Window 3D Scene</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a0a14;}
  #c{position:fixed;top:0;left:0;}
  #hint{
    position:fixed;left:12px;top:12px;z-index:10;
    font:13px/1.6 monospace;color:#9fb3ff;
    background:rgba(10,10,25,.6);padding:10px 14px;border-radius:8px;
    pointer-events:none;max-width:280px;
  }
  #hint b{color:#fff;}
  #hint kbd{background:#222;border:1px solid #444;border-radius:4px;padding:0 5px;color:#fff;}
</style>
<!-- three.js for rendering -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">
  <b>Multiple Window 3D Scene</b><br>
  把這個分頁<b>拉成獨立視窗</b>,再開幾個一樣的網址的視窗。<br>
  移動 / 縮放各視窗,看 3D 場景如何跨越所有視窗。<br>
  <span style="opacity:.7">(同網域、同螢幕才會同步)</span>
</div>

<script>
// ---------------------------------------------------------------------------
// WindowManager: 用 localStorage 在同網域的多個視窗間同步「誰開著、各自的螢幕位置」
// ---------------------------------------------------------------------------
class WindowManager {
  constructor() {
    this.windows = [];
    this.count = 0;
    this.id = 0;
    this.winData = null;
    this.onChangeCb = null;

    // 其他視窗改了 localStorage 時通知本視窗
    addEventListener('storage', (e) => {
      if (e.key === 'mw_windows') {
        const newWins = JSON.parse(e.newValue || '[]');
        if (this.didWindowsChange(this.windows, newWins)) {
          this.windows = newWins;
          this.onChangeCb && this.onChangeCb();
        }
      }
    });

    // 關閉視窗時把自己從清單移除
    addEventListener('beforeunload', () => {
      const idx = this.getWindowIndexById(this.id);
      this.windows.splice(idx, 1);
      this.updateWindowsLocalStorage();
    });
  }

  didWindowsChange(a, b) {
    if (a.length !== b.length) return true;
    return a.some((w, i) => w.id !== b[i].id);
  }

  // 本視窗加入共享清單
  init(metaData) {
    this.windows = JSON.parse(localStorage.getItem('mw_windows') || '[]');
    this.count = parseInt(localStorage.getItem('mw_count') || '0');
    this.count++;
    this.id = this.count;

    const shape = this.getWinShape();
    this.winData = { id: this.id, shape, metaData };
    this.windows.push(this.winData);

    localStorage.setItem('mw_count', this.count);
    this.updateWindowsLocalStorage();
  }

  getWinShape() {
    return { x: window.screenX, y: window.screenY, w: window.innerWidth, h: window.innerHeight };
  }

  getWindowIndexById(id) {
    return this.windows.findIndex((w) => w.id === id);
  }

  updateWindowsLocalStorage() {
    localStorage.setItem('mw_windows', JSON.stringify(this.windows));
  }

  // 每幀呼叫:本視窗位置/大小變了就同步出去
  update() {
    const s = this.getWinShape();
    const o = this.winData.shape;
    if (s.x !== o.x || s.y !== o.y || s.w !== o.w || s.h !== o.h) {
      this.winData.shape = s;
      const idx = this.getWindowIndexById(this.id);
      this.windows[idx].shape = s;
      this.updateWindowsLocalStorage();
      this.onChangeCb && this.onChangeCb();
    }
  }

  setWinShapeChangeCallback(cb) { this.onChangeCb = cb; }
  getWindows() { return this.windows; }
  getThisWindowData() { return this.winData; }
}

// ---------------------------------------------------------------------------
// 場景
// ---------------------------------------------------------------------------
let camera, scene, renderer, world;
let wm;
let spheres = [];
let lines = [];
// 平滑追蹤本視窗在桌面上的位置
let sceneOffset = { x: 0, y: 0 };
let sceneOffsetTarget = { x: 0, y: 0 };
let startTime = Date.now();

const pixR = Math.min(window.devicePixelRatio || 1, 2);

function getTime() { return (Date.now() - startTime) / 1000; }

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a14);

  // 用螢幕像素當世界座標,正交相機讓畫面在所有視窗間對齊
  camera = new THREE.OrthographicCamera(0, window.innerWidth, 0, window.innerHeight, -10000, 10000);
  camera.position.z = 2.5;

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
  renderer.setPixelRatio(pixR);

  world = new THREE.Object3D();
  scene.add(world);

  scene.add(new THREE.AmbientLight(0xffffff, 0.9));

  wm = new WindowManager();
  wm.setWinShapeChangeCallback(updateWindowShape);
  wm.init();

  // 一開始把 offset 對齊現在的螢幕位置,避免開場飄移
  const w = wm.getThisWindowData().shape;
  sceneOffset = { x: -w.x, y: -w.y };
  sceneOffsetTarget = { x: -w.x, y: -w.y };

  setupScene();
  resize();
  render();

  addEventListener('resize', resize);
}

// 依目前開著的視窗數量,建立對應數量的球體
function setupScene() {
  spheres.forEach((s) => world.remove(s));
  lines.forEach((l) => world.remove(l));
  spheres = [];
  lines = [];

  const wins = wm.getWindows();
  wins.forEach((win, i) => {
    const hue = i * 0.13;
    const color = new THREE.Color().setHSL(hue % 1, 0.8, 0.6);
    const size = 80 + i * 18;

    const sphere = new THREE.Mesh(
      new THREE.IcosahedronGeometry(size, 1),
      new THREE.MeshBasicMaterial({ color, wireframe: true })
    );
    world.add(sphere);
    spheres.push(sphere);
  });

  // 相鄰球體之間連線
  for (let i = 0; i < spheres.length - 1; i++) {
    const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
    const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x3355aa }));
    world.add(line);
    lines.push(line);
  }
}

function updateWindowShape() {
  const w = wm.getThisWindowData().shape;
  sceneOffsetTarget = { x: -w.x, y: -w.y };
  // 視窗數量可能改變,重建場景
  if (wm.getWindows().length !== spheres.length) setupScene();
}

function render() {
  const t = getTime();
  wm.update();

  // 平滑插值,讓移動視窗時球體有「飄移慣性」
  const ease = 0.06;
  sceneOffset.x += (sceneOffsetTarget.x - sceneOffset.x) * ease;
  sceneOffset.y += (sceneOffsetTarget.y - sceneOffset.y) * ease;
  world.position.x = sceneOffset.x;
  world.position.y = sceneOffset.y;

  const wins = wm.getWindows();
  if (wins.length !== spheres.length) setupScene();

  // 每顆球放到「它那個視窗的中心」對應的桌面座標
  for (let i = 0; i < spheres.length; i++) {
    const win = wins[i];
    if (!win) continue;
    const cx = win.shape.x + win.shape.w * 0.5;
    const cy = win.shape.y + win.shape.h * 0.5;

    const s = spheres[i];
    s.position.x += (cx - s.position.x) * 0.1;
    s.position.y += (cy - s.position.y) * 0.1;
    s.rotation.x = t * 0.4 + i;
    s.rotation.y = t * 0.3 + i;
  }

  // 更新連線端點
  for (let i = 0; i < lines.length; i++) {
    const a = spheres[i].position;
    const b = spheres[i + 1].position;
    lines[i].geometry.setFromPoints([a.clone(), b.clone()]);
  }

  renderer.render(scene, camera);
  requestAnimationFrame(render);
}

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  camera.left = 0; camera.right = w; camera.top = 0; camera.bottom = h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}

// localStorage 在 file:// 下某些瀏覽器會擋,給個提示但仍嘗試執行
try {
  init();
} catch (err) {
  document.getElementById('hint').innerHTML =
    '初始化失敗:' + err.message + '<br>請用 http(s) 開啟(localStorage 在 file:// 可能被擋)。';
}
</script>
</body>
</html>
