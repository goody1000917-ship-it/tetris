<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiple Window 3D Scene</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#05050c;}
  #c{position:fixed;top:0;left:0;}
  #hint{
    position:fixed;left:12px;top:12px;z-index:10;
    font:13px/1.6 monospace;color:#9fb3ff;
    background:rgba(8,8,20,.55);padding:10px 14px;border-radius:8px;
    pointer-events:none;max-width:300px;
  }
  #hint b{color:#fff;}
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">
  <b>Multiple Window 3D Scene</b><br>
  把這個分頁<b>拉成獨立視窗</b>,再開幾個一樣網址的視窗。<br>
  移動 / 縮放各視窗,看發光的粒子太陽如何跨越所有視窗連動。<br>
  <span style="opacity:.7">(同網域、同螢幕才會同步)</span>
</div>

<script>
// ---------------------------------------------------------------------------
// WindowManager: 用 localStorage 在同網域多視窗間同步「誰開著、各自螢幕位置」
// ---------------------------------------------------------------------------
class WindowManager {
  constructor() {
    this.windows = []; this.count = 0; this.id = 0; this.winData = null; this.onChangeCb = null;
    addEventListener('storage', (e) => {
      if (e.key === 'mw_windows') {
        const newWins = JSON.parse(e.newValue || '[]');
        if (this.didWindowsChange(this.windows, newWins)) {
          this.windows = newWins; this.onChangeCb && this.onChangeCb();
        }
      }
    });
    addEventListener('beforeunload', () => {
      const idx = this.getWindowIndexById(this.id);
      if (idx > -1) this.windows.splice(idx, 1);
      this.updateWindowsLocalStorage();
    });
  }
  didWindowsChange(a, b) { return a.length !== b.length || a.some((w, i) => w.id !== b[i].id); }
  init(metaData) {
    this.windows = JSON.parse(localStorage.getItem('mw_windows') || '[]');
    this.count = parseInt(localStorage.getItem('mw_count') || '0');
    this.count++; this.id = this.count;
    const shape = this.getWinShape();
    this.winData = { id: this.id, shape, metaData };
    this.windows.push(this.winData);
    localStorage.setItem('mw_count', this.count);
    this.updateWindowsLocalStorage();
  }
  getWinShape() { return { x: window.screenX, y: window.screenY, w: window.innerWidth, h: window.innerHeight }; }
  getWindowIndexById(id) { return this.windows.findIndex((w) => w.id === id); }
  updateWindowsLocalStorage() { localStorage.setItem('mw_windows', JSON.stringify(this.windows)); }
  update() {
    const s = this.getWinShape(), o = this.winData.shape;
    if (s.x !== o.x || s.y !== o.y || s.w !== o.w || s.h !== o.h) {
      this.winData.shape = s;
      const idx = this.getWindowIndexById(this.id);
      if (idx > -1) this.windows[idx].shape = s;
      this.updateWindowsLocalStorage();
      this.onChangeCb && this.onChangeCb();
    }
  }
  setWinShapeChangeCallback(cb) { this.onChangeCb = cb; }
  getWindows() { return this.windows; }
  getThisWindowData() { return this.winData; }
}

// ---------------------------------------------------------------------------
// 貼圖:做一張柔邊的圓形 radial gradient 當粒子與光暈
// ---------------------------------------------------------------------------
function makeGlowTexture() {
  const s = 128;
  const cv = document.createElement('canvas'); cv.width = cv.height = s;
  const g = cv.getContext('2d');
  const grad = g.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
  grad.addColorStop(0.0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.2, 'rgba(255,255,255,0.8)');
  grad.addColorStop(0.5, 'rgba(255,255,255,0.25)');
  grad.addColorStop(1.0, 'rgba(255,255,255,0)');
  g.fillStyle = grad; g.fillRect(0, 0, s, s);
  return new THREE.CanvasTexture(cv);
}

// ---------------------------------------------------------------------------
// 場景
// ---------------------------------------------------------------------------
let camera, scene, renderer, world, glowTex;
let wm, suns = [], lines = [];
let sceneOffset = { x: 0, y: 0 }, sceneOffsetTarget = { x: 0, y: 0 };
let startTime = Date.now();
const pixR = Math.min(window.devicePixelRatio || 1, 2);
function getTime() { return (Date.now() - startTime) / 1000; }

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x05050c);
  camera = new THREE.OrthographicCamera(0, innerWidth, 0, innerHeight, -100000, 100000);
  camera.position.z = 1000;
  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
  renderer.setPixelRatio(pixR);
  world = new THREE.Object3D();
  scene.add(world);
  glowTex = makeGlowTexture();

  wm = new WindowManager();
  wm.setWinShapeChangeCallback(onWinChange);
  wm.init();

  const w = wm.getThisWindowData().shape;
  sceneOffset = { x: -w.x, y: -w.y };
  sceneOffsetTarget = { x: -w.x, y: -w.y };

  setupScene();
  resize();
  render();
  addEventListener('resize', resize);
}

// 建立一顆「粒子太陽」:光暈 sprite + 球面分佈的粒子雲
function makeSun(hue) {
  const grp = new THREE.Object3D();
  const baseColor = new THREE.Color().setHSL(hue % 1, 0.85, 0.6);

  // 背景光暈
  const glowMat = new THREE.SpriteMaterial({
    map: glowTex, color: baseColor, transparent: true,
    blending: THREE.AdditiveBlending, depthWrite: false, depthTest: false,
  });
  const glow = new THREE.Sprite(glowMat);
  glow.scale.set(420, 420, 1);
  grp.add(glow);

  // 球面粒子雲
  const N = 1400, radius = 90;
  const positions = new Float32Array(N * 3);
  const colors = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    // 在球面均勻取樣
    const u = Math.random(), v = Math.random();
    const theta = 2 * Math.PI * u, phi = Math.acos(2 * v - 1);
    const r = radius * (0.7 + 0.3 * Math.random());
    positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i*3+2] = r * Math.cos(phi);
    const c = baseColor.clone().offsetHSL(0, 0, (Math.random() - 0.5) * 0.3);
    colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.PointsMaterial({
    size: 7, map: glowTex, vertexColors: true, transparent: true,
    blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true,
  });
  const points = new THREE.Points(geo, mat);
  grp.add(points);
  grp.userData = { points, glow, baseColor };
  return grp;
}

function setupScene() {
  suns.forEach((s) => world.remove(s));
  lines.forEach((l) => world.remove(l));
  suns = []; lines = [];
  const wins = wm.getWindows();
  wins.forEach((win, i) => {
    const sun = makeSun(i * 0.13);
    world.add(sun);
    suns.push(sun);
  });
  for (let i = 0; i < suns.length - 1; i++) {
    const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
    const line = new THREE.Line(geo, new THREE.LineBasicMaterial({
      color: 0x4466cc, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending,
    }));
    world.add(line); lines.push(line);
  }
}

function onWinChange() {
  const w = wm.getThisWindowData().shape;
  sceneOffsetTarget = { x: -w.x, y: -w.y };
  if (wm.getWindows().length !== suns.length) setupScene();
}

function render() {
  const t = getTime();
  wm.update();

  const ease = 0.06;
  sceneOffset.x += (sceneOffsetTarget.x - sceneOffset.x) * ease;
  sceneOffset.y += (sceneOffsetTarget.y - sceneOffset.y) * ease;
  world.position.x = sceneOffset.x;
  world.position.y = sceneOffset.y;

  const wins = wm.getWindows();
  if (wins.length !== suns.length) setupScene();

  for (let i = 0; i < suns.length; i++) {
    const win = wins[i]; if (!win) continue;
    const cx = win.shape.x + win.shape.w * 0.5;
    const cy = win.shape.y + win.shape.h * 0.5;
    const sun = suns[i];
    sun.position.x += (cx - sun.position.x) * 0.1;
    sun.position.y += (cy - sun.position.y) * 0.1;
    sun.userData.points.rotation.y = t * 0.25 + i;
    sun.userData.points.rotation.x = t * 0.15 + i;
    // 光暈呼吸
    const pulse = 1 + 0.08 * Math.sin(t * 1.5 + i);
    sun.userData.glow.scale.set(420 * pulse, 420 * pulse, 1);
  }
  for (let i = 0; i < lines.length; i++) {
    lines[i].geometry.setFromPoints([suns[i].position.clone(), suns[i + 1].position.clone()]);
  }
  renderer.render(scene, camera);
  requestAnimationFrame(render);
}

function resize() {
  camera.right = innerWidth; camera.bottom = innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}

try { init(); }
catch (err) {
  document.getElementById('hint').innerHTML =
    '初始化失敗:' + err.message + '<br>請用 http(s) 開啟。';
}
</script>
</body>
</html>
